services:

  db:
    image: postgres:16-alpine
    container_name: mm_db
    environment:
      POSTGRES_DB: mm_db
      POSTGRES_USER: mm_user
      POSTGRES_PASSWORD: mm_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm_user -d mm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-spring:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    container_name: mm_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mm_db
      SPRING_DATASOURCE_USERNAME: mm_user
      SPRING_DATASOURCE_PASSWORD: mm_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy

  frontend-ionic:
    build:
      context: ./frontend-ionic
      dockerfile: Dockerfile
    container_name: mm_frontend
    ports:
      - "8100:80"
    depends_on:
      - backend-spring

volumes:
  postgres_data: