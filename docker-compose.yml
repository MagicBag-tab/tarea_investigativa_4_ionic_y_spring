services:

  db:
    image: postgres:16-alpine
    container_name: musicmood_db
    environment:
      POSTGRES_DB: musicmood_db
      POSTGRES_USER: musicmood_user
      POSTGRES_PASSWORD: musicmood_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicmood_user -d musicmood_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: musicmood_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/musicmood_db
      SPRING_DATASOURCE_USERNAME: musicmood_user
      SPRING_DATASOURCE_PASSWORD: musicmood_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: musicmood_frontend
    ports:
      - "8100:80"
    depends_on:
      - backend

volumes:
  postgres_data: